<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Authentication{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            background:linear-gradient(135deg,#0f766e,#2563eb);

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;
        }

        .auth-card{

            width:100%;

            max-width:500px;

            background:rgba(255,255,255,.95);

            border-radius:20px;

            box-shadow:0 20px 60px rgba(0,0,0,.25);

            padding:45px;
        }

        .logo{

            width:90px;

            height:90px;

            margin:auto;

            border-radius:50%;

            background:#198754;

            display:flex;

            justify-content:center;

            align-items:center;

            color:white;

            font-size:38px;

            margin-bottom:20px;
        }

        .auth-title{

            font-weight:700;

            color:#198754;
        }

        .form-control{

            height:52px;

            border-radius:12px;
        }

        .btn-auth{

            height:52px;

            border-radius:12px;

            font-weight:600;
        }

        .auth-links a{

            text-decoration:none;

            font-weight:500;
        }

        .auth-links a:hover{

            text-decoration:underline;
        }

        .input-group-text{

            background:#198754;
        
            color:white;
        
            border:none;
        
        }
        
        .form-control{
        
            box-shadow:none !important;
        
            border:1px solid #ced4da;
        
        }
        
        .form-control:focus{
        
            border-color:#198754;
        
            box-shadow:0 0 0 .2rem rgba(25,135,84,.15);
        
        }
        
        .btn-auth{
        
            transition:.3s;
        
        }
        
        .btn-auth:hover{
        
            transform:translateY(-2px);
        
            box-shadow:0 10px 25px rgba(25,135,84,.3);
        
        }
        
        .auth-card{
        
            animation:fadeIn .6s ease;
        }
        
        @keyframes fadeIn{
        
            from{
        
                opacity:0;
        
                transform:translateY(25px);
        
            }
        
            to{
        
                opacity:1;
        
                transform:translateY(0);
        
            }
        
        }

    </style>

</head>

<body>

{% block content %}

{% endblock %}

</body>

</html>
