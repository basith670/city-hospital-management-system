{% extends 'auth_base.html' %}

{% load crispy_forms_tags %}

{% block title %}
Doctor Registration
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center text-success mb-4">

                        Doctor Registration

                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        {{ form|crispy }}

                        <button
                            class="btn btn-success w-100 mt-3">

                            Register

                        </button>

                    </form>

                    <div class="text-center mt-3">

                        <a href="{% url 'login' %}">

                            Already have an account?

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
